spring.application.name=hermes

# gRPC server port — change if needed before deployment
grpc.server.port=9090

# gRPC client — self (REST bridge calls the local gRPC server)
grpc.client.price-service.address=static://localhost:9090
grpc.client.price-service.negotiation-type=plaintext

# Logging
logging.level.net.devh.boot.grpc=DEBUG