services:
  weather-service:
    image: eclipse-temurin:21-jre-jammy
    container_name: weather-service
    ports:
      - "8765:8081" # port externe modifiable selon l'environnement
    environment:
      - SERVER_PORT=8081
    volumes:
      - ./weather-0.0.1-SNAPSHOT.jar:/app/app.jar:ro
    command: [ "java","-jar","/app/app.jar" ]
    restart: unless-stopped
    networks:
      - bot-network

networks:
  bot-network:
    external: true