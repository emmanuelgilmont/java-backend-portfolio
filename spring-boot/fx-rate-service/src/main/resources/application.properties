# Logical service name, used as a Prometheus/Grafana tag (needed to filter multiple
# services in the same Prometheus later on, e.g. q-weather, grpc-price-service).
spring.application.name=fx-rate-service

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.cache.type=redis
# Default TTL for all caches — overridden per-cache in CacheConfig
spring.cache.redis.time-to-live=60s
spring.cache.redis.cache-null-values=false

# Actuator endpoints exposed. Intentionally kept minimal (no /actuator/env,
# /actuator/beans, etc. on an unauthenticated endpoint): only health/info/metrics/prometheus.
management.endpoints.web.exposure.include=health,info,caches,metrics,prometheus

# Detail level for /actuator/health (useful to check Redis connectivity at a glance)
management.endpoint.health.show-details=always

# Application-level cache TTL (seconds) — consumed by CacheConfig
fx-rate.cache.ttl-seconds.fx-rates=60
fx-rate.cache.ttl-seconds.fx-rates-meta=300

# Adds an "application" tag on ALL exported metrics -> lets you filter by service in
# Grafana once several microservices share the same Prometheus instance.
management.metrics.tags.application=${spring.application.name}

# Enables percentile histograms for http.server.requests (required to compute p50/p95/p99
# on the Prometheus side via histogram_quantile()). Without this, only mean/max are available.
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Explicit bucket boundaries in seconds (Micrometer's default is fine, but this narrows
# the range around what's expected for this service: cache hit < 5ms, cache miss ~80ms simulated).
management.metrics.distribution.slo.http.server.requests=5ms,50ms,100ms,200ms,500ms,1s

# No unbounded-cardinality tags (otherwise Prometheus blows up in memory): "uri" must NOT
# be tagged with raw IDs. The RestController needs to use Spring path variables
# (e.g. /rates/{pair}) so Micrometer groups them automatically - this is already the case
# here (RateController), so nothing to change on the code side for this point.