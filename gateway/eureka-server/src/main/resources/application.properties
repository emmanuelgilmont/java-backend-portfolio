spring.application.name=eureka-server
server.port=8761

# Standalone registry: it does not register with itself, nor fetch a registry from itself.
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Self-preservation disabled: fine for a single-node dev/portfolio registry, where a
# service going down should be evicted quickly and visibly rather than kept "phantom"
# to protect against a false network partition (which self-preservation is designed for).
eureka.server.enable-self-preservation=false

management.endpoints.web.exposure.include=health,info
