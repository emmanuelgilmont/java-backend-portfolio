spring.application.name=gateway-service
server.port=8080

# ============================================================================
# NOTE 1 — Static routes for now, not service-discovery routes.
# ============================================================================
# fx-rate-service, grpc-price-service and weather-service do NOT currently
# have the spring-cloud-starter-netflix-eureka-client dependency and are not
# registered in Eureka. Until that's added to each of them, "lb://SERVICE-ID"
# routing will not work — these routes point directly at fixed host:port.
#
# Once a downstream service adds the Eureka client dependency and sets its
# own spring.application.name, its route below can switch from a static
# "uri: http://localhost:PORT" to "uri: lb://SERVICE-ID".

# ============================================================================
# NOTE 2 — Port collision to resolve before running all three side by side.
# ============================================================================
# As documented today, fx-rate-service AND grpc-price-service both default to
# server.port=8080 — same as weather-service's neighbours default elsewhere
# in the portfolio. They cannot run simultaneously on their current defaults.
# The ports below (8091 / 8092) are PLACEHOLDERS: pick real, non-conflicting
# ports and either override server.port via application-gateway.properties
# / an env var per service, or update these routes to match whatever you
# settle on.

spring.cloud.gateway.server.webflux.routes[0].id=fx-rate-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8091
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/rates/**

spring.cloud.gateway.server.webflux.routes[1].id=grpc-price-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8092
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/price/**

spring.cloud.gateway.server.webflux.routes[2].id=weather-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8765
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/v1/weather/**

# ============================================================================
# Eureka client — the gateway itself registers, independent of the routes above.
# ============================================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=health,info,gateway
