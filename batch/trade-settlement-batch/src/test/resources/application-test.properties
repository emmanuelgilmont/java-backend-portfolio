# ============================================================
# trade-settlement-batch — test profile (Layer 1: no Docker)
# ============================================================
# H2 in-memory replaces PostgreSQL.
# Spring Batch creates its BATCH_* tables on H2 automatically.
# schema.sql creates the settlements table (same file as production).

# --- DataSource (H2 in-memory) ---
spring.datasource.url=jdbc:h2:mem:batchdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- Spring Batch ---
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# --- Business schema ---
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql

# --- Logging ---
logging.level.be.gate25=DEBUG
logging.level.org.springframework.batch=INFO
