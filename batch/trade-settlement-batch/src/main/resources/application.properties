# ============================================================
# trade-settlement-batch — production configuration
# ============================================================

# --- DataSource (PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/batchdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=batch
spring.datasource.password=batch

# --- Spring Batch ---
# Spring Batch manages its own BATCH_* tables (BATCH_JOB_INSTANCE, etc.)
spring.batch.jdbc.initialize-schema=always
# Do not auto-run any job on startup — jobs are triggered explicitly
spring.batch.job.enabled=false

# --- Business schema (settlements table) ---
# schema.sql is applied after the DataSource is ready
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql

# --- Logging ---
logging.level.be.gate25=INFO
logging.level.org.springframework.batch=INFO
