name: CI — elasticsearch-formation-search

on:
  push:
    paths:
      - 'elasticsearch/elasticsearch-formation-search/**'
  pull_request:
    paths:
      - 'elasticsearch/elasticsearch-formation-search/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: elasticsearch/elasticsearch-formation-search
        run: mvn test
