services:
  q-weather:
    image: eclipse-temurin:21-jre-alpine
    container_name: q-weather
    ports:
      - "8765:8081" # external port, adjust per environment
    environment:
      - QUARKUS_HTTP_PORT=8081
    volumes:
      - ./q-weather-1.0.0-SNAPSHOT-runner.jar:/app/app.jar:ro
    command: [ "java","-jar","/app/app.jar" ]
    restart: unless-stopped
    networks:
      - bot-network

networks:
  bot-network:
    external: true