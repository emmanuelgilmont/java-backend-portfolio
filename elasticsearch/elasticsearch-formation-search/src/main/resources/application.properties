# Application
spring.application.name=elasticsearch-formation-search

# Elasticsearch
# Dev: points to the local NAS FSCrawler index (see homelab project)
# CI/Test: overridden by application-test.properties (Testcontainers)
spring.elasticsearch.uris=http://192.168.2.30:9200

# Actuator
management.endpoints.web.exposure.include=health,info

# Logging
logging.level.be.gate25=DEBUG
logging.level.org.springframework.data.elasticsearch=DEBUG